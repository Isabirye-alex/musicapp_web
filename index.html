<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Music</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container-fluid app-shell p-0">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
            <a class="navbar-brand" href="#">Atlas Music</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="navTabs">
                    <li class="nav-item"><button class="nav-link active" data-tab="library">Library</button></li>
                    <li class="nav-item"><button class="nav-link" data-tab="uploads">Your Uploads</button></li>
                    <li class="nav-item"><button class="nav-link" data-tab="recent">Recent</button></li>
                    <li class="nav-item"><button class="nav-link" data-tab="profile">Profile</button></li>
                </ul>
            </div>
            <div class="d-flex align-items-center ms-3" id="authPanel"></div>
        </nav>

        <main class="container py-4" id="pageContent"></main>

        <div id="playerSlab" class="player-slab shadow-lg bg-body rounded-top d-none">
            <div class="player-info d-flex align-items-center">
                <img id="playerThumbnail" class="player-thumb rounded" src="" alt="Cover" />
                <div class="ms-3 flex-grow-1">
                    <div id="playerTitle" class="fw-bold"></div>
                    <div id="playerArtist" class="text-muted small"></div>
                </div>
                <button id="favoriteButton" class="btn btn-sm btn-outline-danger me-2"
                    title="Toggle favorite">♥</button>
                <button id="prevButton" class="btn btn-sm btn-outline-secondary" title="Previous">⏮</button>
                <button id="playPauseButton" class="btn btn-sm btn-outline-primary mx-2" title="Play/Pause">▶</button>
                <button id="nextButton" class="btn btn-sm btn-outline-secondary" title="Next">⏭</button>
            </div>
            <div class="progress mt-3" style="height: 6px;">
                <div id="playerProgress" class="progress-bar bg-primary" role="progressbar" style="width: 0%;"></div>
            </div>
        </div>

        <div id="playerModal" class="player-modal d-none"></div>
        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
